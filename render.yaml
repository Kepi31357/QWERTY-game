# Render.com — QWERTY online server (Phase 2.5)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: qwerty-online
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PUBLIC_BASE_URL
        sync: false
    healthCheckPath: /
